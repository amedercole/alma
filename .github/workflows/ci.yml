name: CI

on:
  push:
    branches: [main]
  pull_request:

# Shared env for jobs that talk to the Postgres service container.
env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/alma_test
  SESSION_SECRET: ci-session-secret-at-least-16-chars
  STORAGE_DRIVER: local
  STORAGE_LOCAL_DIR: ./storage/uploads
  EMAIL_FROM: "Alma Leads <onboarding@resend.dev>"
  ATTORNEY_NOTIFY_EMAIL: attorney@example.com
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  test:
    name: Lint, typecheck & tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alma_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alma_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
